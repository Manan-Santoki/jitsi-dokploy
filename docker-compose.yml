# Jitsi Meet for Dokploy + Cloudflare Tunnel setup
# Web traffic goes through CF Tunnel → Traefik → jitsi-web
# Media (UDP 10000) goes directly to JVB on host network

services:
  # Web UI - exposed via Traefik labels (CF Tunnel handles external HTTPS)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        JITSI_IMAGE_VERSION: ${JITSI_IMAGE_VERSION:-stable}
    image: jitsi-web-custom:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts:Z
    environment:
      - DISABLE_HTTPS=1
      - ENABLE_HTTP_REDIRECT=0
      - ENABLE_LETSENCRYPT=0
      - ENABLE_COLIBRI_WEBSOCKET=1
      - ENABLE_XMPP_WEBSOCKET=1
      - PUBLIC_URL=https://${JITSI_DOMAIN}
      - TZ=${TZ:-UTC}
      - ENABLE_AUTH=${ENABLE_AUTH:-0}
      - AUTH_TYPE=${AUTH_TYPE:-internal}
      - ENABLE_GUESTS=${ENABLE_GUESTS:-1}
      - ENABLE_LOBBY=${ENABLE_LOBBY:-1}
      - ENABLE_PREJOIN_PAGE=${ENABLE_PREJOIN_PAGE:-1}
      - ENABLE_WELCOME_PAGE=${ENABLE_WELCOME_PAGE:-1}
      - ENABLE_BREAKOUT_ROOMS=${ENABLE_BREAKOUT_ROOMS:-1}
      - ENABLE_RECORDING=${ENABLE_RECORDING:-0}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_BOSH_URL_BASE=http://xmpp.meet.jitsi:5280
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS}
      - JICOFO_AUTH_USER=focus
      - JVB_TCP_HARVESTER_DISABLED=true
    labels:
      - "traefik.enable=true"
      # HTTP router
      - "traefik.http.routers.jitsi.rule=Host(`${JITSI_DOMAIN}`)"
      - "traefik.http.routers.jitsi.entrypoints=web,websecure"
      - "traefik.http.routers.jitsi.service=jitsi"
      - "traefik.http.services.jitsi.loadbalancer.server.port=80"
      # If Traefik handles TLS (not needed if CF tunnel terminates TLS)
      # - "traefik.http.routers.jitsi.tls=true"
      # - "traefik.http.routers.jitsi.tls.certresolver=letsencrypt"
    networks:
      meet.jitsi:
        aliases:
          - meet.jitsi
      dokploy-network:

  # XMPP server
  prosody:
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    expose:
      - '5222'
      - '5347'
      - '5280'
    volumes:
      - ${CONFIG}/prosody/config:/config:Z
      - ${CONFIG}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
    environment:
      - TZ=${TZ:-UTC}
      - PUBLIC_URL=https://${JITSI_DOMAIN}
      - ENABLE_AUTH=${ENABLE_AUTH:-0}
      - AUTH_TYPE=${AUTH_TYPE:-internal}
      - ENABLE_GUESTS=${ENABLE_GUESTS:-1}
      - ENABLE_LOBBY=${ENABLE_LOBBY:-1}
      - ENABLE_AV_MODERATION=${ENABLE_AV_MODERATION:-1}
      - ENABLE_BREAKOUT_ROOMS=${ENABLE_BREAKOUT_ROOMS:-1}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JIBRI_XMPP_USER=jibri
      - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
      - JIGASI_XMPP_USER=jigasi
      - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
    networks:
      meet.jitsi:
        aliases:
          - xmpp.meet.jitsi

  # Conference focus
  jicofo:
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      - TZ=${TZ:-UTC}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_SERVER=xmpp.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JICOFO_ENABLE_HEALTH_CHECKS=true
      - JVB_BREWERY_MUC=jvbbrewery
      - JIBRI_BREWERY_MUC=jibribrewery
      - JIBRI_PENDING_TIMEOUT=90
      - JIGASI_BREWERY_MUC=jigasibrewery
      - ENABLE_AUTH=${ENABLE_AUTH:-0}
      - AUTH_TYPE=${AUTH_TYPE:-internal}
    depends_on:
      - prosody
    networks:
      meet.jitsi:

  # Video bridge - needs host network for UDP media
  jvb:
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    ports:
      - '${JVB_PORT:-10000}:${JVB_PORT:-10000}/udp'
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - TZ=${TZ:-UTC}
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=xmpp.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=${JVB_PORT:-10000}
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS}
      - JVB_STUN_SERVERS=${JVB_STUN_SERVERS:-stun.l.google.com:19302,stun1.l.google.com:19302}
      - JVB_DISABLE_STUN=${JVB_DISABLE_STUN:-false}
      - COLIBRI_REST_ENABLED=true
      - SHUTDOWN_REST_ENABLED=true
      - PUBLIC_URL=https://${JITSI_DOMAIN}
    depends_on:
      - prosody
    networks:
      meet.jitsi:

networks:
  meet.jitsi:
    driver: bridge
  # Connect to Dokploy's Traefik network
  dokploy-network:
    external: true
